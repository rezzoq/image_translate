# Path to Tesseract language data directory.
# Default: bundled tessdata inside the project (works out of the box).
# Override to use system Tesseract: tessdata.path=C:/Program Files/Tesseract-OCR/tessdata
tessdata.path=src/main/resources/tessdata


# Run locally: docker run -p 5000:5000 libretranslate/libretranslate --load-only en,ru,de,fr,es,it,pt,zh
libretranslate.url=http://localhost:5000/translate
