version: "3.9"

services:

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      LT_LOAD_ONLY: "en,ru,de,fr,es,zh"   # load only needed languages (faster startup)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s          # LibreTranslate needs time to download models

  image-translate:
    build: .
    container_name: image-translate
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TESSDATA_PATH: /usr/share/tessdata
      LIBRETRANSLATE_URL: http://libretranslate:5000
    depends_on:
      libretranslate:
        condition: service_healthy
